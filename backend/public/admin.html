<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dating App · Admin Panel</title>
  <style>
    :root {
      --pink: #F43F5E;
      --magenta: #b8007e;
      --ink: #1e2230;
      --muted: #6b7280;
      --line: #e9eaf0;
      --bg: #f4f5f9;
      --ok: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--ink); }
    button { font: inherit; cursor: pointer; border: none; }
    input, select { font: inherit; }

    /* ---------------- Login ---------------- */
    #login {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--pink), var(--magenta));
      padding: 20px;
    }
    .login-card {
      width: 100%; max-width: 400px; background: #fff; border-radius: 20px; padding: 40px 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,.25);
    }
    .brand { text-align: center; margin-bottom: 26px; }
    .brand .logo {
      width: 60px; height: 60px; border-radius: 18px; margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--pink), var(--magenta));
      display: flex; align-items: center; justify-content: center; font-size: 30px;
    }
    .brand h1 { font-size: 21px; }
    .brand p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 11px;
      background: #fafafb; font-size: 15px; outline: none; transition: border-color .15s;
    }
    .field input:focus { border-color: var(--pink); background: #fff; }
    .btn-primary {
      width: 100%; padding: 13px; border-radius: 11px; color: #fff; font-weight: 700; font-size: 15px;
      background: linear-gradient(135deg, var(--pink), var(--magenta));
    }
    .btn-primary:disabled { opacity: .6; }
    .error { color: var(--danger); font-size: 13px; margin-bottom: 12px; min-height: 16px; text-align: center; }
    .hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 16px; }

    /* ---------------- App shell ---------------- */
    #app { display: none; min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; background: #14162a; color: #cfd2e0; flex-shrink: 0;
      display: flex; flex-direction: column; padding: 22px 16px;
    }
    .sidebar .s-brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 22px; }
    .sidebar .s-brand .dot {
      width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--pink), var(--magenta));
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .sidebar .s-brand b { color: #fff; font-size: 15px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 10px;
      color: #aeb2c7; font-size: 14px; font-weight: 500; background: transparent; width: 100%; text-align: left; margin-bottom: 4px;
    }
    .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
    .nav-item.active { background: linear-gradient(135deg, var(--pink), var(--magenta)); color: #fff; }
    .sidebar .spacer { flex: 1; }
    .logout { color: #ff9aa9; }

    .main { flex: 1; min-width: 0; }
    .topbar {
      background: #fff; border-bottom: 1px solid var(--line); padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 5;
    }
    .topbar h2 { font-size: 19px; }
    .admin-chip { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .admin-chip .av {
      width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), var(--magenta));
      color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
    .admin-chip .role { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .content { padding: 26px 28px; }

    /* ---------------- Stat cards ---------------- */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 26px; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 18px 20px; }
    .card .k { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .card .v { font-size: 30px; font-weight: 800; margin-top: 6px; }
    .card .v.small { font-size: 20px; }
    .card.accent { background: linear-gradient(135deg, var(--pink), var(--magenta)); border: none; color: #fff; }
    .card.accent .k { color: rgba(255,255,255,.85); }

    /* ---------------- Panel + table ---------------- */
    .panel { background: #fff; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }
    .panel-head { padding: 16px 18px; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .panel-head h3 { font-size: 15px; margin-right: auto; }
    .panel-head input, .panel-head select {
      padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fafafb; font-size: 13px; outline: none;
    }
    .panel-head input:focus { border-color: var(--pink); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 16px; font-size: 13.5px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    tr:last-child td { border-bottom: none; }
    .u-cell { display: flex; align-items: center; gap: 10px; }
    .u-cell .av { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: #eee; display: flex; align-items: center; justify-content: center; color: #999; font-weight: 700; font-size: 13px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge.active { background: #dcfce7; color: #15803d; }
    .badge.banned { background: #fee2e2; color: #b91c1c; }
    .act { display: flex; gap: 6px; }
    .act button { padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid var(--line); background: #fff; }
    .act .ban { color: var(--warn); border-color: #fde68a; }
    .act .activate { color: var(--ok); border-color: #bbf7d0; }
    .act .del { color: var(--danger); border-color: #fecaca; }
    .pager { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--muted); }
    .pager button { padding: 7px 14px; border-radius: 9px; border: 1px solid var(--line); background: #fff; font-weight: 600; }
    .pager button:disabled { opacity: .4; cursor: default; }
    .empty { padding: 40px; text-align: center; color: var(--muted); }
    .view { display: none; }
    .view.active { display: block; }
    @media (max-width: 720px) { .sidebar { display: none; } .content { padding: 16px; } }
  </style>
</head>
<body>
  <!-- ================= LOGIN ================= -->
  <div id="login">
    <div class="login-card">
      <div class="brand">
        <div class="logo">💘</div>
        <h1>Admin Panel</h1>
        <p>Sign in to the Dating App dashboard</p>
      </div>
      <form id="loginForm">
        <div class="error" id="loginError"></div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="admin@datingapp.com" autocomplete="username" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button class="btn-primary" id="loginBtn" type="submit">Sign in</button>
      </form>
      <p class="hint">Super Admin access only</p>
    </div>
  </div>

  <!-- ================= APP ================= -->
  <div id="app">
    <div class="layout">
      <aside class="sidebar">
        <div class="s-brand"><div class="dot">💘</div><b>Dating Admin</b></div>
        <button class="nav-item active" data-view="dashboard">📊 Dashboard</button>
        <button class="nav-item" data-view="users">👥 Users</button>
        <div class="spacer"></div>
        <button class="nav-item logout" id="logoutBtn">⎋ Logout</button>
      </aside>

      <div class="main">
        <div class="topbar">
          <h2 id="pageTitle">Dashboard</h2>
          <div class="admin-chip">
            <div style="text-align:right">
              <div id="adminName" style="font-weight:600"></div>
              <div class="role" id="adminRole"></div>
            </div>
            <div class="av" id="adminAv">A</div>
          </div>
        </div>

        <div class="content">
          <!-- Dashboard -->
          <section class="view active" id="view-dashboard">
            <div class="cards" id="statCards"></div>
            <div class="panel">
              <div class="panel-head"><h3>Members by gender</h3></div>
              <div class="cards" style="margin:0;padding:18px" id="genderCards"></div>
            </div>
          </section>

          <!-- Users -->
          <section class="view" id="view-users">
            <div class="panel">
              <div class="panel-head">
                <h3>Users</h3>
                <input id="search" placeholder="Search name / phone / location…" />
                <select id="statusFilter">
                  <option value="">All status</option>
                  <option value="active">Active</option>
                  <option value="banned">Banned</option>
                </select>
                <select id="genderFilter">
                  <option value="">All genders</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div style="overflow-x:auto">
                <table>
                  <thead>
                    <tr><th>User</th><th>Phone</th><th>Email</th><th>Gender</th><th>Location</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
                  </thead>
                  <tbody id="usersBody"></tbody>
                </table>
              </div>
              <div class="pager">
                <span id="pagerInfo">—</span>
                <div style="display:flex;gap:8px">
                  <button id="prevBtn">← Prev</button>
                  <button id="nextBtn">Next →</button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
